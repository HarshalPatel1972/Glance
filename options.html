<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Glance Options</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <h2>Glance Options</h2>
    <label>Default Opacity:
        <input type="range" id="default-opacity" min="0.1" max="1" step="0.1" value="1">
        <span id="opacity-val">100%</span>
    </label>
    <label>Auto-Delete History After (Days):
        <input type="number" id="expiration" min="1" max="30" value="7">
    </label>
    <button id="save">Save Settings</button>
    <p><a href="#" id="shortcuts">Configure Keyboard Shortcuts</a></p>
    <script src="options.js"></script>
</body>

</html>
